<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">

<style>
    .product-card {
        margin-top: 8%;
        padding: 2rem;
        border-radius: 15px;
        transition: all 0.3s ease;
        background: #ffffff;
    }

    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .product-img {
        max-height: 200px;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .product-card:hover .product-img {
        transform: scale(1.05);
    }

    .price {
        font-size: 1.8rem;
        font-weight: bold;
        color: #0d6efd;
    }

    .rating i {
        font-size: 0.9rem;
    }

    .btn-cart {
        border-radius: 30px;
        padding: 6px 14px;
        transition: 0.3s;
    }

    .btn-cart:hover {
        background-color: #0b5ed7;
    }

    .btn-wishlist {
        border-radius: 50%;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-wishlist:hover {
        background-color: #dc3545;
        color: #fff;
    }
</style>

<div class="card product-card shadow-sm m-4">
    <div class="row g-0 align-items-center">

        <!-- Image -->
        <div class="col-md-4 text-center p-3">
            <img src="{{ gadgets.image }}"
                 class="img-fluid product-img rounded"
                 alt="Product Image">
        </div>

        <!-- Content -->
        <div class="col-md-8">
            <div class="card-body">

                <h5 class="card-title fw-bold">{{ gadgets.name }}</h5>

                <p class="card-text text-muted">
                    {{ gadgets.description }}
                </p>

                <!-- Price & Rating -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="price">${{ gadgets.price }}</span>

                    <div class="rating">
                        <i class="bi bi-star-fill text-warning"></i>
                        <i class="bi bi-star-fill text-warning"></i>
                        <i class="bi bi-star-fill text-warning"></i>
                        <i class="bi bi-star-fill text-warning"></i>
                        <i class="bi bi-star-half text-warning"></i>
                        <small class="text-muted ms-1">(4.5)</small>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button class="btn btn-primary btn-sm btn-cart">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </button>

                    <button class="btn btn-outline-danger btn-sm btn-wishlist">
                        <i class="bi bi-heart"></i>
                    </button>
                </div>

            </div>
        </div>

    </div>
</div>
